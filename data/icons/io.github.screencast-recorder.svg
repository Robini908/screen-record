<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d8fe0"/>
      <stop offset="100%" stop-color="#1a5c9e"/>
    </linearGradient>
  </defs>

  <!-- rounded base -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- monitor body -->
  <rect x="16" y="22" width="80" height="60" rx="6" fill="url(#screen)"/>
  <rect x="16" y="22" width="80" height="60" rx="6" fill="none" stroke="#555" stroke-width="1"/>

  <!-- screen glare -->
  <rect x="20" y="26" width="30" height="16" rx="4" fill="#fff" opacity="0.08"/>

  <!-- play triangle on screen -->
  <polygon points="50,38 68,52 50,66" fill="#fff" opacity="0.9"/>

  <!-- monitor stand -->
  <rect x="44" y="84" width="24" height="6" rx="2" fill="#555"/>
  <rect x="38" y="90" width="36" height="5" rx="3" fill="#555"/>

  <!-- camera body -->
  <rect x="74" y="20" width="42" height="30" rx="8" fill="#444"/>
  <rect x="74" y="20" width="42" height="30" rx="8" fill="none" stroke="#555" stroke-width="1"/>

  <!-- camera lens outer -->
  <circle cx="95" cy="35" r="12" fill="#222"/>
  <!-- camera lens inner -->
  <circle cx="95" cy="35" r="8" fill="#111"/>
  <!-- lens reflection -->
  <circle cx="92" cy="32" r="3" fill="#fff" opacity="0.2"/>
  <!-- lens glare -->
  <ellipse cx="97" cy="37" rx="4" ry="2" fill="#fff" opacity="0.08"
           transform="rotate(-30,97,37)"/>

  <!-- record indicator -->
  <circle cx="95" cy="35" r="3.5" fill="#e95420"/>
  <circle cx="95" cy="35" r="3.5" fill="#ff3b30" opacity="0.9">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- camera top flash -->
  <rect x="108" y="22" width="6" height="4" rx="1" fill="#555"/>
</svg>
